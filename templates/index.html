<!DOCTYPE html>
<html>
<head><title>Aviator Signal</title>
<style>
*{font-family:sans-serif;}body{background:#0a0f1e;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.container{background:#151e2f;padding:30px;border-radius:20px;width:90%;max-width:500px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.8);}h1{color:#f0b90b;margin-bottom:5px;}input{padding:12px;width:80%;border-radius:10px;border:none;margin:15px 0;background:#0d1421;color:#fff;text-align:center;font-size:16px;}button{background:#f0b90b;padding:12px 30px;border:none;border-radius:10px;font-weight:bold;font-size:16px;cursor:pointer;transition:0.3s;}button:hover{background:#d4a20a;}.result{background:#0d1421;padding:15px;border-radius:10px;margin-top:15px;border-left:5px solid #f0b90b;}.signal{font-size:28px;font-weight:bold;}.exit{color:#f0b90b;font-size:22px;margin:5px 0;}.warning{color:#ff6b6b;font-size:12px;margin-top:15px;border-top:1px solid #2a3a55;padding-top:10px;}
</style>
</head>
<body>
<div class="container">
<h1>✈️ AVIATOR AI</h1>
<p style="color:#8a9bb5;">Last 5-15 multipliers (comma separated)</p>
<input type="text" id="history" value="1.2, 1.8, 2.1, 1.5, 1.9, 2.5, 1.3">
<button onclick="getSignal()">🚀 Get Signal</button>
<div class="result" id="result">Enter numbers above and click</div>
<div class="warning">⚠️ Educational purpose only. Game is random. Bet responsibly.</div>
</div>
<script>
async function getSignal(){
 const input=document.getElementById('history').value;
 const numbers=input.split(',').map(n=>parseFloat(n.trim())).filter(n=>!isNaN(n));
 if(numbers.length<3){alert('Enter at least 3 numbers!'); return;}
 const res=await fetch('/api/signal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({history:numbers})});
 const data=await res.json();
 if(data.error){document.getElementById('result').innerHTML=`<div style="color:red;">${data.error}</div>`; return;}
 document.getElementById('result').innerHTML=`
 <div class="signal">${data.action}</div>
 <div class="exit">Exit at: ${data.exit_at}x</div>
 <div style="color:#b0c4de;font-size:14px;">📌 ${data.reason}</div>
 <div style="display:flex;justify-content:space-around;margin-top:12px;background:#0a0f1e;padding:10px;border-radius:8px;">
   <span>Avg: <strong>${data.stats.avg}x</strong></span>
   <span>Last: <strong>${data.stats.last}x</strong></span>
   <span>Rounds: <strong>${data.stats.total}</strong></span>
 </div>`;
}
</script>
</body>
</html>
